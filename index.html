<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>行业统计复盘工具</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #1677ff; --success: #52c41a; --danger: #ff4d4f; --bg: #f0f2f5; --text-main: #1a1a1a; --text-sub: #434343; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, "PingFang SC", sans-serif; background: var(--bg); margin: 0; padding: 15px 10px; color: var(--text-main); display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 12px; }
        .drop-area { border: 2px dashed #d9d9d9; background: #fafafa; padding: 20px; text-align: center; border-radius: 10px; cursor: pointer; color: var(--primary); }
        
        .history-wrapper { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
        .history-tabs { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; flex: 1; }
        .tab { background: #e8e8e8; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 11px; white-space: nowrap; flex-shrink: 0; }
        .tab.active { background: var(--primary); color: white; }
        
        /* 强化清除按钮视觉反馈 */
        .btn-clear { background: #fff1f0; color: #ff4d4f; border: 1px solid #ffccc7; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: all 0.2s; }
        .btn-clear:hover { background: #ff4d4f; color: #fff; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        #main-table td { padding: 10px 4px; border-bottom: 1px solid #f0f0f0; line-height: 1.3; }
        #main-table th { padding: 8px 4px; color: #888; font-size: 13px; font-weight: normal; border-bottom: 2px solid #f0f0f0; }
        
        .col-icon { width: 22px; text-align: center; color: var(--primary); font-size: 10px; }
        .col-rank { width: 30px; text-align: center; color: #999; font-weight: bold; }
        .col-industry-name { width: auto; font-weight: bold; font-size: 15px; color: #000; }
        .col-stock-count { width: 55px; text-align: center; }
        .col-top-stock { width: 95px; text-align: right; }

        .hot-up { color: #f5222d; font-size: 10px; font-weight: bold; margin-left: 4px; background: #fff1f0; padding: 1px 3px; border-radius: 3px; }
        .badge { background: var(--primary); color: white; padding: 2px 6px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .top-tag { color: #cf1322; font-weight: bold; background: #fff1f0; padding: 1px 4px; border-radius: 4px; font-size: 12px; border: 1px solid #ffa39e; }
        
        .detail-row { display: none; background: #fafafa; }
        .detail-box { padding: 5px 0 10px 2px; border-left: 4px solid var(--primary); background: #fff; margin: 5px 0 10px 5px; }
        .detail-inner-table { width: 100%; table-layout: fixed; border: 1px solid #eee; }

        /* 响应式字体方案保持 */
        .detail-inner-table { font-size: 12px; }
        .detail-inner-table thead th { font-size: 12px; padding: 8px 4px; }
        .detail-inner-table td { font-size: 12px; padding: 8px 3px; }

        @media screen and (min-width: 768px) {
            .detail-inner-table { font-size: 14px; }
            .detail-inner-table thead th { font-size: 14px; padding: 10px 5px; }
            .detail-inner-table td { font-size: 14px; padding: 10px 5px; }
            .col-detail-name { width: 90px !important; }
        }

        .detail-inner-table thead th { background: #fdfdfd; color: #777; font-weight: bold; border-bottom: 1px solid #eee; text-align: left; }
        .detail-inner-table td { white-space: nowrap; overflow: hidden; color: var(--text-sub); border: 1px solid #f5f5f5; }
        
        .col-detail-rank { width: 45px; text-align: center; color: #888; }
        .col-detail-name { width: 75px; color: #000; font-weight: 500; } 
        .col-detail-full { font-weight: bold; color: #444; }
        .col-detail-count { font-weight: bold; color: var(--primary); text-align: center; width: 45px; }

        .btn-save { background: var(--success); color: white; border: none; padding: 14px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 16px; box-shadow: 0 4px 12px rgba(82,196,26,0.2); }
    </style>
</head>
<body>

<div class="container" id="app-container">
    <div class="card">
        <h2 style="text-align:center; margin: 0 0 12px 0; font-size: 20px;">📊 行业统计助手</h2>
        <div class="drop-area" id="drop-zone">
            <b>📁 点击或拖入文件</b>
        </div>
    </div>

    <div class="history-wrapper" id="history-wrapper" style="display:none;">
        <div class="history-tabs" id="history-tabs"></div>
        <button id="btn-clear-id" class="btn-clear">🗑 清除记录</button>
    </div>

    <div id="capture-area">
        <div class="card" id="table-card" style="display:none; padding: 15px 12px;">
            <div style="display:flex; justify-content: space-between; margin-bottom: 10px; align-items: center;">
                <h4 id="current-title" style="margin:0; color:#666; font-size: 12px;"></h4>
                <div id="compare-tag" style="font-size: 11px; color:var(--danger); font-weight:bold;"></div>
            </div>
            <table id="main-table">
                <thead>
                    <tr>
                        <th class="col-icon"></th><th class="col-rank">排</th><th class="col-industry-name">一级行业</th><th class="col-stock-count">个股</th><th class="col-top-stock">人气王</th>
                    </tr>
                </thead>
                <tbody id="main-body"></tbody>
            </table>
        </div>
    </div>
    
    <button id="save-btn" class="btn-save" style="display:none" onclick="saveImg()">📸 生成复盘分析长图</button>
</div>

<script>
// 核心数据初始化
let storageKey = 'trade_stats_history';
let historyData = JSON.parse(localStorage.getItem(storageKey) || '[]');

window.onload = () => { 
    refreshTabs(); 
    if(historyData.length > 0) renderResult(0);
    
    // 强制绑定清除事件
    const clearBtn = document.getElementById('btn-clear-id');
    if(clearBtn){
        clearBtn.onclick = function(e) {
            e.preventDefault();
            executeForceClear();
        };
    }
};

// 顽疾修复：强制清除逻辑
function executeForceClear() {
    // 1. 清空存储
    localStorage.removeItem(storageKey);
    localStorage.clear();
    historyData = [];
    
    // 2. 物理重置 DOM，防止 PC 端缓存显示
    const tableCard = document.getElementById('table-card');
    const saveBtn = document.getElementById('save-btn');
    const wrapper = document.getElementById('history-wrapper');
    if(tableCard) tableCard.style.display = 'none';
    if(saveBtn) saveBtn.style.display = 'none';
    if(wrapper) wrapper.style.display = 'none';
    
    // 3. 彻底重载页面（增加随机数参数穿透 PC 浏览器缓存）
    const cleanUrl = window.location.origin + window.location.pathname + '?t=' + Date.now();
    window.location.replace(cleanUrl);
}

const dz = document.getElementById('drop-zone');
const fileInput = document.createElement('input');
fileInput.type = 'file'; fileInput.accept = ".csv, .xlsx, .xls";
dz.onclick = () => fileInput.click();
fileInput.onchange = e => handleFile(e.target.files[0]);

function handleFile(file) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:""});
            processAndSave(file.name, data);
        } catch(err) { alert("读取失败"); }
    };
    reader.readAsArrayBuffer(file);
}

function processAndSave(filename, data) {
    const stats = {};
    const keys = Object.keys(data[0]);
    const colInd = keys.find(k => k.includes('行业'));
    const colName = keys.find(k => k.includes('简称')) || keys.find(k => k.includes('名称'));
    const colNum = keys.find(k => (k.includes('家数') || k.includes('调研数')) && !k.includes('排名'));
    const colRank = keys.find(k => k.includes('排名') || k.includes('序'));

    data.forEach((item, index) => {
        if (!item[colInd] || !item[colName]) return;
        let l1 = item[colInd].toString().split('-')[0].trim();
        let name = item[colName].toString().trim();
        let num = parseInt(item[colNum]) || 0;
        let cleanRank = (item[colRank] || (index + 1)).toString().split('/')[0].trim(); 
        if (name === "undefined" || l1 === "undefined") return;

        if(!stats[l1]) stats[l1] = { count: 0, top: name, max: num, stocks: [] };
        stats[l1].count++;
        stats[l1].stocks.push({ name, full: item[colInd], num, rank: cleanRank });
        if(num > stats[l1].max) { stats[l1].max = num; stats[l1].top = name; }
    });

    const sortedData = Object.entries(stats).filter(e => e[1].count > 0).sort((a,b) => b[1].count - a[1].count);
    const top5List = sortedData.slice(0, 5).map(item => item[0]);
    historyData.unshift({ id: Date.now(), time: new Date().toLocaleString().slice(5, 16).replace(/\//g, '-'), filename, data: sortedData, top5: top5List });
    if(historyData.length > 8) historyData.pop();
    localStorage.setItem(storageKey, JSON.stringify(historyData));
    refreshTabs();
    renderResult(0);
}

function refreshTabs() {
    const wrapper = document.getElementById('history-wrapper');
    const container = document.getElementById('history-tabs');
    if(!historyData || historyData.length === 0) { 
        if(wrapper) wrapper.style.display = 'none'; 
        return; 
    }
    wrapper.style.display = 'flex';
    container.innerHTML = historyData.map((item, i) => `<div class="tab ${i===0?'active':''}" onclick="renderResult(${i}, this)">${item.time}</div>`).join('');
}

function renderResult(index, tabEl) {
    const res = historyData[index];
    if(!res) return;
    if(tabEl) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); tabEl.classList.add('active'); }
    const prevRes = historyData[index + 1];
    const prevTop5 = prevRes ? prevRes.top5 : [];
    document.getElementById('compare-tag').innerText = prevRes ? "🔥 对比热度开启" : "📊 记录模式";
    document.getElementById('current-title').innerText = "源文件：" + res.filename;
    const tbody = document.getElementById('main-body');
    tbody.innerHTML = '';
    res.data.forEach(([name, info], i) => {
        const isNewInTop5 = (i < 5) && prevRes && !prevTop5.includes(name);
        const rowId = `detail-${index}-${i}`;
        const mainRow = document.createElement('tr');
        mainRow.onclick = () => { const d = document.getElementById(rowId); d.style.display = d.style.display === 'table-row' ? 'none' : 'table-row'; };
        mainRow.innerHTML = `
            <td class="col-icon">▼</td>
            <td class="col-rank">${i+1}</td>
            <td class="col-industry-name">${name}${isNewInTop5?'<span class="hot-up">🔥热度上升</span>':''}</td>
            <td class="col-stock-count"><span class="badge">${info.count}</span></td>
            <td class="col-top-stock"><span class="top-tag">${info.top}</span><br><small style="color:#999;font-size:10px;">${info.max}家调研</small></td>
        `;
        tbody.appendChild(mainRow);
        const detailRow = document.createElement('tr');
        detailRow.id = rowId; detailRow.className = 'detail-row';
        detailRow.innerHTML = `<td colspan="5"><div class="detail-box"><table class="detail-inner-table"><thead><tr><th class="col-detail-rank">排名</th><th class="col-detail-name">个股简称</th><th>细分行业</th><th class="col-detail-count">家数</th></tr></thead><tbody>${info.stocks.sort((a,b)=>b.num-a.num).map(s=>`<tr><td class="col-detail-rank">${s.rank}</td><td class="col-detail-name">${s.name}</td><td class="col-detail-full">${s.full}</td><td class="col-detail-count">${s.num}</td></tr>`).join('')}</tbody></table></div></td>`;
        tbody.appendChild(detailRow);
    });
    document.getElementById('table-card').style.display = 'block';
    document.getElementById('save-btn').style.display = 'block';
}

function saveImg() {
    const btn = document.getElementById('save-btn');
    btn.innerText = "⚡ 生成中...";
    html2canvas(document.getElementById('capture-area'), { scale: 2.5, backgroundColor: "#f0f2f5" }).then(c => {
        const a = document.createElement('a');
        a.href = c.toDataURL('image/png'); a.download = `分析复盘_${Date.now()}.png`; a.click();
        btn.innerText = "📸 生成复盘分析长图";
    });
}
</script>
</body>
</html>
